projects:
    title: Projeler
    intro: >
      Çalıştığım şirkette yazılım projelerinin yanında logo tarafına entegre olan uygulamalar da geliştirdim. 
      Logo Object, Logo Flow teknolojilerinde de kendimi geliştirme fırsatım oldu.
      
    assignments:
      - title: İş Takip Sistemi 
        tagline: "Gönderilen mailleri otomatik olarak iş kaydına dönüştüren, var olan iş kayıtlarını güncelleyen iş takip sistemi. Asp.net core ile yazıldı."

      - title: Transay Web Api
        tagline: "Virman fişi aktarımı, cari güncelleme vb. özellikleri barındıran web api projesi. Asp.net core web api, logo objects kullanıldı."

      - title: KAÇUV Logo Crm Entegrasyonu
        tagline: "Belirtilen web apiden gelen bağış, bağışçıları alıp Logo Crm rest servisine ileten entegrasyon projesi. Asp.net core, Logo Crm Rest Api kullanıldı."

      - title: Şengüller Logo Tiger Enterprise Entegrasyonu
        tagline: "Turkcell Web Apiden gelen malzeme kartı, hizmet kartı, satış faturası, cari kartı gibi bilgileri Logo Tiger programına anlık olarak aktaran entegrasyon projesi. Asp.net core, Logo Objects kullanıldı."

      - title: Logo E-Arşiv Mail Servis
        tagline: "E-Arşiv faturalarını otomatik olarak ilgili cariye mail olarak gönderen proje. Asp.net core, e-logo wcf servisi kullanıldı."

